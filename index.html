<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>朝のTODO Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Shippori+Mincho:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f5f0; --surface: #ffffff; --border: #e0dbd0; --border-strong: #c8c0b0;
    --text: #1a1814; --text-muted: #7a7468; --text-faint: #b0a898;
    --accent: #2d6a4f; --accent-light: #e8f4ee; --accent-muted: #52996e;
    --warn: #92400e; --warn-light: #fef3c7;
    --danger: #9b1c1c; --danger-light: #fee2e2;
    --info: #1e3a5f; --info-light: #dbeafe;
    --radius: 6px; --radius-lg: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Shippori Mincho', serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; line-height: 1.6; }
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 100; }
  .logo { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; color: var(--text-muted); letter-spacing: 0.08em; }
  .logo span { color: var(--accent); }
  #authBtn { font-family: 'DM Mono', monospace; font-size: 12px; padding: 6px 16px; border: 1px solid var(--border-strong); border-radius: var(--radius); background: transparent; cursor: pointer; color: var(--text); transition: all 0.15s; }
  #authBtn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  #authBtn.signed-in { color: var(--accent); border-color: var(--accent); }
  .container { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }
  .state-panel { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 1rem; text-align: center; }
  .state-panel .icon { font-size: 2.5rem; opacity: 0.25; }
  .state-panel p { color: var(--text-muted); font-size: 13px; max-width: 300px; }
  .file-picker { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; margin-bottom: 1.5rem; }
  .file-picker h2 { font-size: 13px; font-weight: 500; color: var(--text-muted); font-family: 'DM Mono', monospace; margin-bottom: 1rem; letter-spacing: 0.06em; }
  .file-list { display: flex; flex-wrap: wrap; gap: 8px; }
  .file-chip { font-family: 'DM Mono', monospace; font-size: 11px; padding: 4px 12px; border: 1px solid var(--border); border-radius: 20px; cursor: pointer; transition: all 0.15s; color: var(--text-muted); background: var(--bg); }
  .file-chip:hover { border-color: var(--accent-muted); color: var(--accent); background: var(--accent-light); }
  .file-chip.active { border-color: var(--accent); color: var(--accent); background: var(--accent-light); font-weight: 500; }
  .section-block { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 1rem; overflow: hidden; }
  .section-header { padding: 10px 1.25rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--bg); }
  .section-title { font-size: 13px; font-weight: 600; letter-spacing: 0.04em; }
  .section-count { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-faint); background: var(--border); padding: 2px 8px; border-radius: 10px; }

  /* ===== PC テーブル ===== */
  .data-table { width: 100%; border-collapse: collapse; table-layout: fixed; }

  /* 列幅の定義 */
  .data-table .col-date    { width: 130px; }
  .data-table .col-time    { width: 80px; }
  .data-table .col-place   { width: 120px; }
  .data-table .col-prio    { width: 70px; }
  .data-table .col-person  { width: 110px; }
  .data-table .col-reason  { width: 18%; }
  .data-table .col-action  { width: 22%; }
  .data-table .col-del     { width: 36px; }

  .data-table th { font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.08em; padding: 8px 10px; text-align: left; background: var(--bg); border-bottom: 1px solid var(--border); white-space: nowrap; overflow: hidden; }
  .data-table td { padding: 6px 10px; border-bottom: 1px solid var(--border); vertical-align: top; font-size: 13px; }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table tr:hover td { background: #fafaf7; }

  /* textarea：resize非表示・自動高さ */
  .data-table td textarea {
    font-family: 'Shippori Mincho', serif;
    font-size: 13px;
    background: transparent;
    border: none;
    outline: none;
    width: 100%;
    color: var(--text);
    resize: none;
    overflow: hidden;
    line-height: 1.55;
    padding: 0;
    display: block;
  }
  .data-table td textarea:focus {
    background: var(--accent-light);
    border-radius: 3px;
    padding: 3px 5px;
    margin: -3px -5px;
    width: calc(100% + 10px);
  }

  /* 優先度バッジ */
  .p-high { display: inline-block; font-family: 'DM Mono', monospace; font-size: 10px; padding: 2px 8px; border-radius: 10px; background: var(--danger-light); color: var(--danger); white-space: nowrap; }
  .p-mid  { display: inline-block; font-family: 'DM Mono', monospace; font-size: 10px; padding: 2px 8px; border-radius: 10px; background: var(--warn-light);   color: var(--warn); white-space: nowrap; }
  .p-low  { display: inline-block; font-family: 'DM Mono', monospace; font-size: 10px; padding: 2px 8px; border-radius: 10px; background: var(--info-light);   color: var(--info); white-space: nowrap; }
  td.prio-cell { vertical-align: middle; }

  .del-btn { width: 24px; height: 24px; border: none; background: none; color: var(--text-faint); cursor: pointer; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 15px; transition: all 0.1s; flex-shrink: 0; }
  .del-btn:hover { background: var(--danger-light); color: var(--danger); }

  .actions-bar { display: flex; align-items: center; justify-content: flex-end; gap: 10px; padding: 1.25rem 0 0; }
  .btn { font-family: 'DM Mono', monospace; font-size: 12px; padding: 8px 20px; border-radius: var(--radius); border: 1px solid var(--border-strong); cursor: pointer; transition: all 0.15s; background: transparent; color: var(--text); }
  .btn:hover { background: var(--bg); }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: #235e43; border-color: #235e43; }
  .btn-primary:active { transform: scale(0.98); }

  .gemini-prompt-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; align-items: center; justify-content: center; }
  .gemini-prompt-modal.open { display: flex; }
  .modal-box { background: var(--surface); border-radius: var(--radius-lg); border: 1px solid var(--border); width: 90%; max-width: 680px; max-height: 80vh; display: flex; flex-direction: column; overflow: hidden; }
  .modal-header { padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .modal-header h3 { font-size: 14px; font-weight: 600; }
  .modal-close { background: none; border: none; cursor: pointer; font-size: 18px; color: var(--text-muted); line-height: 1; }
  .modal-body { flex: 1; overflow-y: auto; padding: 1.25rem; }
  .modal-body textarea { font-family: 'DM Mono', monospace; font-size: 12px; width: 100%; min-height: 300px; border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; resize: vertical; color: var(--text); background: var(--bg); line-height: 1.6; }
  .modal-footer { padding: 1rem 1.25rem; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; gap: 10px; }
  .copy-success { font-size: 12px; color: var(--accent); font-family: 'DM Mono', monospace; opacity: 0; transition: opacity 0.3s; }
  .copy-success.show { opacity: 1; }
  .gemini-link { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent-muted); text-decoration: none; display: flex; align-items: center; gap: 4px; }
  .gemini-link:hover { color: var(--accent); text-decoration: underline; }
  .loading-dots::after { content: ''; animation: dots 1.2s steps(4,end) infinite; }
  @keyframes dots { 0%,20%{content:''} 40%{content:'.'} 60%{content:'..'} 80%,100%{content:'...'} }
  .empty-row td { color: var(--text-faint); font-style: italic; font-size: 12px; text-align: center; padding: 1.5rem; }

  /* ===== モバイル：カード型 ===== */
  @media (max-width: 700px) {
    header { padding: 0 1rem; }
    .container { padding: 1rem; }
    .file-picker { padding: 1rem; }
    .file-picker h2 { font-size: 11px; }
    .data-table { table-layout: auto; }
    .data-table thead { display: none; }
    .data-table tbody { display: block; }
    .data-table tr { display: block; background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 12px; }
    .data-table tr:last-child { border-bottom: none; }
    .data-table td {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 3px 0;
  border-bottom: none;
  font-size: 13px;
  width: 100%;
  overflow: hidden;
}
    .data-table td[data-label]::before { content: attr(data-label); font-family: 'DM Mono', monospace; font-size: 9px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.06em; min-width: 56px; flex-shrink: 0; padding-top: 3px; line-height: 1.4; }
    .data-table td:last-child { justify-content: flex-end; padding-top: 6px; }
    .data-table td:last-child::before, .data-table td:last-child[data-label]::before { display: none; }
.data-table td textarea {
  font-size: 13px;
  flex: 1;
  min-width: 0;
  width: 100%;
  overflow: hidden;
  overflow-wrap: break-word;
}
    td.prio-cell { display: flex; }
    .actions-bar { flex-direction: column; align-items: stretch; }
    .actions-bar .btn { text-align: center; padding: 10px; }
    .modal-box { width: 95%; max-height: 90vh; }
    .modal-body textarea { min-height: 200px; font-size: 11px; }
    .modal-footer { flex-direction: column; align-items: stretch; gap: 8px; }
    .modal-footer .btn { text-align: center; }
  }
</style>
</head>
<body>
<header>
  <div class="logo">todo<span>.</span>dashboard</div>
  <button id="authBtn" onclick="handleAuth()">Googleでログイン</button>
</header>
<div class="container" id="app">
  <div class="state-panel" id="loginPanel">
    <div class="icon">☀️</div>
    <p>Googleアカウントでログインして、<br>朝のTODOドラフトを読み込んでください。</p>
  </div>
  <div id="mainPanel" style="display:none">
    <div class="file-picker">
      <h2>DRAFT FILES — マイドライブ/Areas/diary/todo/</h2>
      <div class="file-list" id="fileList">
        <span style="font-size:12px;color:var(--text-faint)" class="loading-dots">読み込み中</span>
      </div>
    </div>
    <div id="editorArea"></div>
    <div class="actions-bar" id="actionsBar" style="display:none">
      <button class="btn" onclick="reloadFile()">↺ リロード</button>
      <button class="btn btn-primary" onclick="openGeminiModal()">Gemini用にコピー ↗</button>
    </div>
  </div>
</div>
<div class="gemini-prompt-modal" id="geminiModal">
  <div class="modal-box">
    <div class="modal-header">
      <h3>Gemini用プロンプト</h3>
      <button class="modal-close" onclick="closeGeminiModal()">×</button>
    </div>
    <div class="modal-body"><textarea id="geminiText" readonly></textarea></div>
    <div class="modal-footer">
      <a href="https://gemini.google.com" target="_blank" class="gemini-link">→ Gemini を開く</a>
      <div style="display:flex;align-items:center;gap:12px">
        <span class="copy-success" id="copySuccess">✓ コピーしました</span>
        <button class="btn btn-primary" onclick="copyGeminiText()">コピー</button>
      </div>
    </div>
  </div>
</div>
<script>
const CLIENT_ID = '342241282955-og8a6tqauudvh0sqkb2vak1u4ckqpbfq.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/drive.readonly';
const GEMINI_PREFIX = `以下の予定とタスクをGoogle CalendarとGoogle Tasksに登録してください。
・予定は日付・時刻・場所を含めて登録してください
・TODOはGoogle Tasksにタイトルと期限を設定してください
・「（仮）」の日付はそのまま使用してください
・私に確認せずにすべて登録してください

---
`;

let tokenClient, accessToken = null, currentData = null, currentFileId = null;

function gapiLoaded() {
  gapi.load('client', async () => {
    await gapi.client.init({ discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'] });
  });
}
function gisLoaded() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID, scope: SCOPES,
    callback: (resp) => {
      if (resp.error) return;
      accessToken = resp.access_token;
      document.getElementById('authBtn').textContent = 'ログアウト';
      document.getElementById('authBtn').classList.add('signed-in');
      document.getElementById('loginPanel').style.display = 'none';
      document.getElementById('mainPanel').style.display = 'block';
      loadFileList();
    }
  });
}
function handleAuth() {
  if (accessToken) {
    google.accounts.oauth2.revoke(accessToken);
    accessToken = null;
    document.getElementById('authBtn').textContent = 'Googleでログイン';
    document.getElementById('authBtn').classList.remove('signed-in');
    document.getElementById('loginPanel').style.display = 'flex';
    document.getElementById('mainPanel').style.display = 'none';
  } else {
    tokenClient.requestAccessToken({ prompt: 'consent' });
  }
}
async function loadFileList() {
  const fl = document.getElementById('fileList');
  fl.innerHTML = '<span style="font-size:12px;color:var(--text-faint)" class="loading-dots">読み込み中</span>';
  try {
    const resp = await gapi.client.drive.files.list({
      q: "name contains 'draft_2026-' and trashed=false",
      orderBy: 'name desc', pageSize: 14, fields: 'files(id,name)'
    });
    const files = resp.result.files;
    if (!files.length) { fl.innerHTML = '<span style="font-size:12px;color:var(--text-faint)">ファイルが見つかりません</span>'; return; }
    fl.innerHTML = '';
    files.forEach(f => {
      const chip = document.createElement('button');
      chip.className = 'file-chip';
      chip.textContent = f.name.replace('draft_','').replace('.md','');
      chip.onclick = () => loadFile(f.id, f.name, chip);
      fl.appendChild(chip);
    });
  } catch(e) {
    fl.innerHTML = '<span style="font-size:12px;color:var(--text-faint)">取得エラー: ' + e.message + '</span>';
  }
}
async function loadFile(fileId, fileName, chip) {
  document.querySelectorAll('.file-chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  currentFileId = fileId;
  document.getElementById('editorArea').innerHTML = '<div style="padding:2rem;text-align:center;color:var(--text-faint);font-size:12px" class="loading-dots">読み込み中</div>';
  document.getElementById('actionsBar').style.display = 'none';
  try {
    const resp = await gapi.client.drive.files.get({ fileId, alt: 'media' });
    currentData = parseMarkdown(resp.body);
    renderEditor(currentData);
    document.getElementById('actionsBar').style.display = 'flex';
    // 初期表示ですべてのtextareaを自動高さに
    setTimeout(() => document.querySelectorAll('.data-table textarea').forEach(autoResize), 50);
  } catch(e) {
    document.getElementById('editorArea').innerHTML = '<div style="padding:2rem;text-align:center;color:var(--text-faint);font-size:12px">読み込みエラー: ' + e.message + '</div>';
  }
}
async function reloadFile() {
  const active = document.querySelector('.file-chip.active');
  if (active) active.click();
}

function parseMarkdown(md) {
  const sections = {};
  const lines = md.split('\n');
  let current = null, tableLines = [];
  const sectionMap = [
    ['信頼度アップTODO', 'trust'],
    ['おすすめTODO',     'recommended'],
    ['フォローアップ',  'followup'],
    ['他者サポート',    'support'],
    ['予定',            'schedule'],
    ['TODO',            'todo']
  ];
  for (const line of lines) {
    if (line.match(/^#{2,3}\s/)) {
      let matched = false;
      for (const [k,v] of sectionMap) {
        if (line.includes(k)) {
          if (current && tableLines.length) sections[current] = parseTable(tableLines);
          current = v; tableLines = []; matched = true; break;
        }
      }
      if (!matched && current && tableLines.length) {
        sections[current] = parseTable(tableLines); current = null; tableLines = [];
      }
    } else if (current && line.trim().startsWith('|')) {
      tableLines.push(line);
    }
  }
  if (current && tableLines.length) sections[current] = parseTable(tableLines);
  return sections;
}
function parseTable(lines) {
  const rows = lines.filter(l => l.trim().startsWith('|') && !l.includes('---'));
  if (rows.length < 2) return { headers: [], data: [] };
  const headers = rows[0].split('|').map(h=>h.trim()).filter(Boolean);
  const data = rows.slice(1).map(r => r.split('|').map(c=>c.trim()).filter(Boolean));
  return { headers, data };
}

const sectionMeta = [
  { key: 'schedule',    title: '📅 予定' },
  { key: 'todo',        title: '✅ TODO' },
  { key: 'recommended', title: '💡 おすすめTODO' },
  { key: 'followup',    title: '🔄 フォローアップ' },
  { key: 'support',     title: '🤝 他者サポート' },
  { key: 'trust',       title: '🌱 信頼度アップTODO' }
];

// 列名に応じたCSSクラスを返す
function colClass(h) {
  if (h === '日付' || h === '予定日') return 'col-date';
  if (h === '時刻') return 'col-time';
  if (h === '場所') return 'col-place';
  if (h === '優先度') return 'col-prio';
  if (h === '相手' || h === '依頼者') return 'col-person';
  if (h === '理由') return 'col-reason';
  if (h === '1分アクション') return 'col-action';
  return '';
}

function renderEditor(data) {
  const area = document.getElementById('editorArea');
  area.innerHTML = '';
  for (const meta of sectionMeta) {
    const sec = data[meta.key];
    if (!sec || !sec.headers.length) continue;
    const colDefs = sec.headers.map(h => `<col class="${colClass(h)}">`).join('') + '<col class="col-del">';
    const block = document.createElement('div');
    block.className = 'section-block';
    block.innerHTML = `
      <div class="section-header">
        <span class="section-title">${meta.title}</span>
        <span class="section-count" id="count-${meta.key}">${sec.data.length} 件</span>
      </div>
      <table class="data-table" id="table-${meta.key}">
        <colgroup>${colDefs}</colgroup>
        <thead><tr>${sec.headers.map(h=>`<th>${h}</th>`).join('')}<th></th></tr></thead>
        <tbody>${renderRows(meta.key, sec)}</tbody>
      </table>`;
    area.appendChild(block);
  }
}

function renderRows(key, sec) {
  if (!sec.data.length) return `<tr class="empty-row"><td colspan="${sec.headers.length+1}">データなし</td></tr>`;
  return sec.data.map((row, ri) => {
    const cells = sec.headers.map((h, ci) => {
      const val = row[ci] || '';
      if (h === '優先度') {
        const cls = val.includes('高') ? 'p-high' : val.includes('中') ? 'p-mid' : 'p-low';
        return `<td class="prio-cell" data-label="${escHtml(h)}"><span class="${cls}">${escHtml(val)}</span></td>`;
      }
      return `<td data-label="${escHtml(h)}"><textarea rows="1" data-key="${key}" data-row="${ri}" data-col="${ci}" onchange="updateCell(this)" oninput="autoResize(this)">${escHtml(val)}</textarea></td>`;
    }).join('');
    return `<tr id="row-${key}-${ri}">${cells}<td style="padding:4px 6px;vertical-align:middle"><button class="del-btn" onclick="deleteRow('${key}',${ri})" title="削除">×</button></td></tr>`;
  }).join('');
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = (el.scrollHeight + 2) + 'px';
}
function updateCell(el) {
  const { key, row, col } = el.dataset;
  if (currentData[key] && currentData[key].data[row]) currentData[key].data[row][col] = el.value;
}
function deleteRow(key, ri) {
  currentData[key].data.splice(ri, 1);
  const tbody = document.querySelector(`#table-${key} tbody`);
  tbody.innerHTML = renderRows(key, currentData[key]);
  document.getElementById(`count-${key}`).textContent = currentData[key].data.length + ' 件';
  setTimeout(() => tbody.querySelectorAll('textarea').forEach(autoResize), 50);
}
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function buildMarkdown(data) {
  let md = '';
  for (const meta of sectionMeta) {
    const sec = data[meta.key];
    if (!sec || !sec.data.length) continue;
    md += `### ${meta.title}\n`;
    md += '| ' + sec.headers.join(' | ') + ' |\n';
    md += '|' + sec.headers.map(()=>'---').join('|') + '|\n';
    sec.data.forEach(row => { md += '| ' + row.join(' | ') + ' |\n'; });
    md += '\n';
  }
  return md;
}
function openGeminiModal() {
  document.getElementById('geminiText').value = GEMINI_PREFIX + buildMarkdown(currentData);
  document.getElementById('geminiModal').classList.add('open');
}
function closeGeminiModal() { document.getElementById('geminiModal').classList.remove('open'); }
function copyGeminiText() {
  navigator.clipboard.writeText(document.getElementById('geminiText').value).then(() => {
    const el = document.getElementById('copySuccess');
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2500);
  });
}
document.getElementById('geminiModal').addEventListener('click', function(e) { if (e.target === this) closeGeminiModal(); });
</script>
<script src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
<script src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
</body>
</html>
